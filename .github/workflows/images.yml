name: Release Images

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.head.repo.full_name || github.repository }}-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: shamubernetes

jobs:
  lint:
    name: Lint
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run linter
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12.2

  test:
    name: Test
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run tests
        run: |
          make test
          make check-generated-drift

  test-e2e:
    name: E2E Test
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install the latest version of kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/latest/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Verify kind installation
        run: kind version

      - name: Run e2e tests
        env:
          CERT_MANAGER_INSTALL_SKIP: "true"
          E2E_SKIP_TEARDOWN: "true"
        run: |
          make test-e2e
          make check-generated-drift

  known-hosts:
    name: Verify known_hosts freshness
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Verify default known_hosts entries are current
        run: make check-known-hosts-current

  images:
    name: Build ${{ matrix.name }} image (${{ matrix.arch }})
    needs:
      - lint
      - test
      - test-e2e
      - known-hosts
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: operator
            image: git-mirror-operator
            dockerfile: Dockerfile
            platform: linux/amd64
            arch: amd64
            runner: blacksmith-2vcpu-ubuntu-2404
          - name: operator
            image: git-mirror-operator
            dockerfile: Dockerfile
            platform: linux/arm64
            arch: arm64
            runner: blacksmith-2vcpu-ubuntu-2404-arm
          - name: sync
            image: git-mirror-sync
            dockerfile: Dockerfile.sync
            platform: linux/amd64
            arch: amd64
            runner: blacksmith-2vcpu-ubuntu-2404
          - name: sync
            image: git-mirror-sync
            dockerfile: Dockerfile.sync
            platform: linux/arm64
            arch: arm64
            runner: blacksmith-2vcpu-ubuntu-2404-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Blacksmith Docker builder
        uses: useblacksmith/setup-docker-builder@v1

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}

      - name: Build and push platform image by digest
        id: build
        uses: useblacksmith/build-push-action@v2
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }},push-by-digest=true,name-canonical=true,push=true
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true

      - name: Export digest
        run: |
          mkdir -p "/tmp/digests/${{ matrix.image }}"
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${{ matrix.image }}/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ matrix.image }}-${{ matrix.arch }}
          path: /tmp/digests/${{ matrix.image }}/*
          if-no-files-found: error
          retention-days: 1

  manifests:
    name: Publish ${{ matrix.name }} manifest
    needs: images
    runs-on: blacksmith-2vcpu-ubuntu-2404
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: operator
            image: git-mirror-operator
          - name: sync
            image: git-mirror-sync

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Download platform digests
        uses: actions/download-artifact@v8
        with:
          pattern: digests-${{ matrix.image }}-*
          path: /tmp/digests/${{ matrix.image }}
          merge-multiple: true

      - name: Create and publish multi-arch manifest
        shell: bash
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          cd "/tmp/digests/${{ matrix.image }}"
          refs=()
          for digest_file in *; do
            [ -f "$digest_file" ] || continue
            refs+=("${REGISTRY}/${IMAGE_NAMESPACE}/${{ matrix.image }}@sha256:${digest_file}")
          done

          if [ "${#refs[@]}" -ne 2 ]; then
            printf 'expected 2 platform digests for %s, found %s\n' "${{ matrix.image }}" "${#refs[@]}" >&2
            exit 1
          fi

          while IFS= read -r tag; do
            [ -n "$tag" ] || continue
            docker buildx imagetools create \
              --tag "$tag" \
              "${refs[@]}"
          done <<< "$TAGS"

  release:
    name: Create GitHub Release
    needs: manifests
    runs-on: blacksmith-2vcpu-ubuntu-2404
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          body: |
            Container images:

            - `ghcr.io/${{ env.IMAGE_NAMESPACE }}/git-mirror-operator:${{ github.ref_name }}`
            - `ghcr.io/${{ env.IMAGE_NAMESPACE }}/git-mirror-sync:${{ github.ref_name }}`
