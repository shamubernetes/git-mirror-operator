apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: gitmirrors.mirror.maude.dev
spec:
  group: mirror.maude.dev
  names:
    kind: GitMirror
    listKind: GitMirrorList
    plural: gitmirrors
    singular: gitmirror
    shortNames:
      - gm
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Repo
          type: string
          jsonPath: .spec.github.repo
        - name: Last Success
          type: date
          jsonPath: .status.lastSuccessAt
        - name: Pending
          type: boolean
          jsonPath: .status.pendingResync
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required: [provider, github, source, target, mirror]
              properties:
                provider:
                  type: string
                  enum: [github]
                github:
                  type: object
                  required: [owner, repo, webhookSecretRef]
                  properties:
                    owner:
                      type: string
                    repo:
                      type: string
                    webhookSecretRef:
                      type: object
                      required: [name, key]
                      properties:
                        name:
                          type: string
                        key:
                          type: string
                source:
                  type: object
                  required: [url, sshSecretRef]
                  properties:
                    url:
                      type: string
                    sshSecretRef:
                      type: object
                      required: [name, key]
                      properties:
                        name:
                          type: string
                        key:
                          type: string
                target:
                  type: object
                  required: [url, sshSecretRef]
                  properties:
                    url:
                      type: string
                    sshSecretRef:
                      type: object
                      required: [name, key]
                      properties:
                        name:
                          type: string
                        key:
                          type: string
                mirror:
                  type: object
                  properties:
                    mode:
                      type: string
                      enum: [exact, additive]
                      default: exact
                    includeTags:
                      type: boolean
                      default: true
                    prune:
                      type: boolean
                      default: true
                fallback:
                  type: object
                  properties:
                    schedule:
                      type: string
                job:
                  type: object
                  properties:
                    image:
                      type: string
                    backoffLimit:
                      type: integer
                      format: int32
                    activeDeadlineSeconds:
                      type: integer
                      format: int64
                    ttlSecondsAfterFinished:
                      type: integer
                      format: int32
                    knownHostsConfigMapName:
                      type: string
                    knownHostsConfigMapKey:
                      type: string
                    serviceAccountName:
                      type: string
                    resources:
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
            status:
              type: object
              properties:
                observedGeneration:
                  type: integer
                  format: int64
                lastWebhookAt:
                  type: string
                  format: date-time
                lastDeliveryID:
                  type: string
                lastTriggeredAt:
                  type: string
                  format: date-time
                lastJobName:
                  type: string
                lastSuccessAt:
                  type: string
                  format: date-time
                lastFailureAt:
                  type: string
                  format: date-time
                lastError:
                  type: string
                lastMirroredRevision:
                  type: string
                pendingResync:
                  type: boolean
                conditions:
                  type: array
                  x-kubernetes-list-type: map
                  x-kubernetes-list-map-keys: [type]
                  items:
                    type: object
                    required: [type, status, reason, message]
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      observedGeneration:
                        type: integer
                        format: int64
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason:
                        type: string
                      message:
                        type: string
