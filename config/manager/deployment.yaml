apiVersion: apps/v1
kind: Deployment
metadata:
  name: git-mirror-operator
  namespace: git-mirror-operator-system
  labels:
    app.kubernetes.io/name: git-mirror-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: git-mirror-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: git-mirror-operator
    spec:
      serviceAccountName: git-mirror-operator
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
      containers:
        - name: manager
          image: ghcr.io/shamubernetes/git-mirror-operator:latest
          args:
            - --webhook-bind-address=:8082
            - --health-probe-bind-address=:8081
          env:
            - name: SYNC_IMAGE
              value: ghcr.io/shamubernetes/git-mirror-sync:latest
          ports:
            - name: http
              containerPort: 8082
            - name: probes
              containerPort: 8081
          livenessProbe:
            httpGet:
              path: /healthz
              port: probes
          readinessProbe:
            httpGet:
              path: /readyz
              port: probes
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
