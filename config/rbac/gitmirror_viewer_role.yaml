# This rule is not used by the project git-mirror-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to mirror.maude.dev resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: git-mirror-operator
    app.kubernetes.io/managed-by: kustomize
  name: gitmirror-viewer-role
rules:
- apiGroups:
  - mirror.maude.dev
  resources:
  - gitmirrors
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - mirror.maude.dev
  resources:
  - gitmirrors/status
  verbs:
  - get
