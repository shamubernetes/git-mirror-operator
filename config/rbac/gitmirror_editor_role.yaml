# This rule is not used by the project git-mirror-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the mirror.shamubernetes.com.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: git-mirror-operator
    app.kubernetes.io/managed-by: kustomize
  name: gitmirror-editor-role
rules:
- apiGroups:
  - mirror.shamubernetes.com
  resources:
  - gitmirrors
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - mirror.shamubernetes.com
  resources:
  - gitmirrors/status
  verbs:
  - get
