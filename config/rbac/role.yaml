---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - get
- apiGroups:
  - batch
  resources:
  - jobs
  verbs:
  - create
  - get
  - list
  - watch
- apiGroups:
  - mirror.maude.dev
  resources:
  - gitmirrors
  verbs:
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - mirror.maude.dev
  resources:
  - gitmirrors/status
  verbs:
  - get
  - patch
  - update
