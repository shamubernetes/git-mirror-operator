apiVersion: mirror.maude.dev/v1alpha1
kind: GitMirror
metadata:
  labels:
    app.kubernetes.io/name: git-mirror-operator
    app.kubernetes.io/managed-by: kustomize
  name: source-repo
spec:
  provider: github
  github:
    owner: example
    repo: source-repo
    webhookSecretRef:
      name: source-repo-github-webhook
      key: secret
  source:
    url: https://github.com/example/source-repo.git
    auth:
      type: githubApp
      githubApp:
        appIDSecretRef:
          name: source-repo-github-app
          key: app-id
        installationIDSecretRef:
          name: source-repo-github-app
          key: installation-id
        privateKeySecretRef:
          name: source-repo-github-app
          key: private-key.pem
  target:
    url: https://codeberg.org/example/source-repo.git
    auth:
      type: basic
      basic:
        usernameSecretRef:
          name: source-repo-target-basic
          key: username
        passwordSecretRef:
          name: source-repo-target-basic
          key: password
  mirror:
    mode: exact
  fallback:
    schedule: "0 */6 * * *"
  job:
    ttlSecondsAfterFinished: 3600
    activeDeadlineSeconds: 1800
